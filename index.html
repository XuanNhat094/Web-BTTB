<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Bảo Trì Thiết Bị</title>
    <style>
        :root {
            --primary-color: #1a73e8;
            --success-color: #28a745;
            --danger-color: #d32f2f;
            --bg-color: #f8f9fa;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; margin: 0; padding: 20px; background-color: var(--bg-color); color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        h2 { color: var(--primary-color); text-align: center; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 30px; }

        /* Form nhập liệu */
        .form-section { background: #f1f3f4; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        
        input { padding: 12px; border: 1px solid #ced4da; border-radius: 6px; font-size: 14px; transition: border 0.3s; }
        input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
        
        .btn-add { background-color: var(--success-color); color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-add:hover { background-color: #218838; transform: translateY(-1px); }

        /* Tra cứu nhanh */
        .search-section { margin-bottom: 20px; display: flex; align-items: center; gap: 15px; background: #fffde7; padding: 15px; border-radius: 8px; border: 1px solid #fff59d; }
        .search-input { flex: 1; padding: 12px; border: 2px solid var(--primary-color); border-radius: 6px; font-size: 16px; font-weight: 500; }

        /* Bảng dữ liệu */
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background-color: var(--primary-color); color: white; padding: 15px; text-align: left; font-size: 13px; text-transform: uppercase; position: sticky; top: 0; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 14px; }
        tr:hover { background-color: #f8fbff; }
        tr.hidden { display: none; }

        /* Badge trạng thái */
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; }
        .badge-overdue { background-color: #fdecea; color: var(--danger-color); border: 1px solid #fad2cf; }
        .badge-ok { background-color: #e6f4ea; color: #1e7e34; border: 1px solid #ceead6; }

        #loading { text-align: center; display: none; color: var(--primary-color); font-weight: bold; margin-bottom: 15px; }
        
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🛠️ Quản Lý & Tra Cứu Bảo Trì Thiết Bị</h2>

    <div class="search-section">
        <span>🔍 <strong>TRA CỨU NHANH:</strong></span>
        <input type="text" id="searchInput" class="search-input" onkeyup="filterTable()" placeholder="Nhập Mã số hoặc Tên máy để tìm...">
    </div>

    <div id="loading">⏳ Đang xử lý dữ liệu...</div>

    <div class="form-section">
        <div class="form-grid">
            <input type="text" id="mCode" placeholder="Mã thiết bị (VD: LAS-01)">
            <input type="text" id="mName" placeholder="Tên máy (VD: Máy cắt Laser)">
            <input type="date" id="mDate" title="Ngày bảo trì gần nhất">
            <input type="number" id="mCycle" placeholder="Chu kỳ bảo trì (Số ngày)">
        </div>
        <button class="btn-add" onclick="addMachine()">💾 CẬP NHẬT DỮ LIỆU</button>
    </div>

    <div class="table-responsive">
        <table id="machineTable">
            <thead>
                <tr>
                    <th>Mã Số</th>
                    <th>Tên Thiết Bị</th>
                    <th>Bảo Trì Gần Nhất</th>
                    <th>Chu Kỳ</th>
                    <th>Hạn Tiếp Theo</th>
                    <th>Trạng Thái</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzgX1RvgaxsBZn-GIfr1EaPSBxAZqn1mvE0MZGovnAN1UW0rV_tk4HV-BN34FkF6xfV/exec";

    // 1. Tự động lấy dữ liệu khi mở trang
    async function loadData() {
        showLoading(true);
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            renderTable(data);
        } catch (error) {
            console.error("Lỗi:", error);
            alert("Không thể kết nối với dữ liệu!");
        }
        showLoading(false);
    }

    // 2. Gửi dữ liệu mới lên Google Sheets
    async function addMachine() {
        const code = document.getElementById('mCode').value;
        const name = document.getElementById('mName').value;
        const lastDate = document.getElementById('mDate').value;
        const cycle = document.getElementById('mCycle').value;

        if (!code || !name || !lastDate || !cycle) {
            alert("Vui lòng nhập đầy đủ các ô!");
            return;
        }

        showLoading(true);
        const payload = { code, name, lastDate, cycle: parseInt(cycle) };

        try {
            await fetch(WEB_APP_URL, {
                method: "POST",
                redirect: "follow",
                body: JSON.stringify(payload)
            });
            alert("Lưu thành công!");
            location.reload(); 
        } catch (error) {
            alert("Lỗi khi lưu dữ liệu!");
        }
        showLoading(false);
    }

    // 3. Hiển thị dữ liệu ra bảng
    function renderTable(data) {
        const tbody = document.querySelector('#machineTable tbody');
        tbody.innerHTML = '';
        const today = new Date();
        today.setHours(0,0,0,0);

        data.forEach(row => {
            const [id, code, name, lastDate, cycle] = row;
            const dLast = new Date(lastDate);
            const dNext = new Date(dLast);
            dNext.setDate(dLast.getDate() + parseInt(cycle));

            const isOverdue = today > dNext;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${code}</strong></td>
                <td>${name}</td>
                <td>${dLast.toLocaleDateString('vi-VN')}</td>
                <td>${cycle} ngày</td>
                <td><b style="color: var(--primary-color)">${dNext.toLocaleDateString('vi-VN')}</b></td>
                <td>
                    <span class="badge ${isOverdue ? 'badge-overdue' : 'badge-ok'}">
                        ${isOverdue ? '⚠️ CẦN BẢO TRÌ' : '✅ AN TOÀN'}
                    </span>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 4. Hàm tìm kiếm máy nhanh
    function filterTable() {
        const filter = document.getElementById("searchInput").value.toUpperCase();
        const rows = document.querySelector("#machineTable tbody").getElementsByTagName("tr");

        for (let i = 0; i < rows.length; i++) {
            const textCode = rows[i].cells[0].textContent || rows[i].cells[0].innerText;
            const textName = rows[i].cells[1].textContent || rows[i].cells[1].innerText;
            
            if (textCode.toUpperCase().includes(filter) || textName.toUpperCase().includes(filter)) {
                rows[i].classList.remove("hidden");
            } else {
                rows[i].classList.add("hidden");
            }
        }
    }

    function showLoading(status) {
        document.getElementById('loading').style.display = status ? 'block' : 'none';
    }

    // Khởi chạy
    loadData();
</script>

</body>
</html>
